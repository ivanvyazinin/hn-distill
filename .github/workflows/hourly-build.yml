name: hourly-build

on:
  schedule:
    # Every 3 hours at :00 UTC (00:00, 03:00, 06:00, ...)
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: hn-distill-hourly
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show Node.js version
        run: node --version

      - name: Setup Bun and Install Dependencies
        uses: ./.github/actions/setup-bun

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Restore state from VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          mkdir -p data
          rsync -az "$VPS_USER@$VPS_HOST:$VPS_PATH/" data/

      - name: Run data pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional: higher Jina Reader RPM for Cloudflare-blocked article origins.
          # Fallback works without a key; unset secret is fine.
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          ARTICLE_FETCH_READER_FALLBACK: ${{ vars.ARTICLE_FETCH_READER_FALLBACK || 'true' }}
          TOP_N: ${{ vars.TOP_N || '40' }}
          SUMMARIZE_MIN_SCORE: ${{ vars.SUMMARIZE_MIN_SCORE || '300' }}
          SUMMARIZE_MIN_COMMENTS: ${{ vars.SUMMARIZE_MIN_COMMENTS || '100' }}
          SUMMARY_LANG: ${{ vars.SUMMARY_LANG || 'ru' }}
          AGGREGATE_FROM_DB: ${{ vars.AGGREGATE_FROM_DB || 'true' }}
          LLM_USAGE_ENABLED: ${{ vars.LLM_USAGE_ENABLED || 'false' }}
          # All model IDs (OPENROUTER_*, COMMENTS_*, TAGS_*, POST_GUARD_*,
          # SUMMARY_CONTENT_REJECT_MODEL) come only from config/env.ts defaults.
          # Do not reintroduce workflow model env or repository model variables.
        run: make run

      - name: Backup state to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          if [ -s data/hn.sqlite ]; then
            rsync -az --delete \
              --exclude 'bench/' \
              --exclude '.DS_Store' \
              --exclude '*.sqlite-shm' \
              --exclude '*.sqlite-wal' \
              data/ "$VPS_USER@$VPS_HOST:$VPS_PATH/"
          else
            echo "data/hn.sqlite is missing or empty; skipping backup"
          fi

      - name: Build site
        env:
          SITE: ${{ vars.SITE }}
          BASE: ${{ vars.BASE || '/' }}
          GOATCOUNTER_CODE: ${{ vars.GOATCOUNTER_CODE }}
          # Same publish bar as aggregate: loadAggregated filters by these.
          SUMMARIZE_MIN_SCORE: ${{ vars.SUMMARIZE_MIN_SCORE || '300' }}
          SUMMARIZE_MIN_COMMENTS: ${{ vars.SUMMARIZE_MIN_COMMENTS || '100' }}
        run: make build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment: github-pages
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
