name = "hn-distill-pipeline"
main = "worker/src/index.ts"
compatibility_date = "2026-01-21"
compatibility_flags = ["nodejs_compat"]

[vars]
# Opt-in only: set true for the legacy Readability drain, deploy, then set false.
WORKER_EXTRACTION_BACKFILL_ENABLE = "false"

[triggers]
crons = ["0 * * * *"]

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "hn-distill-data"

[[d1_databases]]
binding = "DB"
database_name = "hn_distill"
database_id = "fcdf0fb6-2761-492d-a222-1a6218f76fda"
# No migrations_dir: the remote D1 was provisioned from schema.sql and applies additive changes
# manually via `wrangler d1 execute --remote` (see docs/architecture.md). Wiring up wrangler's
# migrations workflow would make `d1 migrations apply` replay 001-004, whose unguarded ALTERs
# fail with "duplicate column" against the already-provisioned schema. Local SQLite migrates via
# utils/sqlite-store.ts (reads worker/d1/migrations directly), so this key is unnecessary anyway.
